name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for OIDC trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi-release  # optional: require manual approval gate in GitHub settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token needed — uses OIDC Trusted Publisher (configured on pypi.org)
