  help_text: |
    可用命令：
    /model <名称>        切换模型
    /mode <chat|plan|agent|yolo>   切换模式
    /lang <en|zh_CN>     切换语言
    /theme <名称>        切换主题
    /attach <路径>       附加文件
    /search <关键词>     搜索会话
    /clear               清空对话
    /compact [关注点]    将历史压缩为摘要以释放上下文
    /tools               列出可用工具
    /mcp                 MCP 服务器管理
    /fork                复制会话
    /save                保存会话
    /load                加载会话
    /protocol <openai|anthropic>   切换协议
    /help                显示此帮助
